<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 260px;
      background: #0f172a;
      color: #e2e8f0;
    }
    .header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .icon { font-size: 22px; }
    .title { font-size: 13px; font-weight: 700; color: #f8fafc; }
    .subtitle { font-size: 10px; color: #64748b; margin-top: 1px; }
    .body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #1e293b;
    }
    .row:last-of-type { border-bottom: none; }
    .label { font-size: 11px; color: #94a3b8; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 999px;
    }
    .badge-green { background: #052e16; color: #4ade80; }
    .badge-red   { background: #450a0a; color: #f87171; }
    .badge-yellow{ background: #422006; color: #fb923c; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-green  { background: #22c55e; }
    .dot-red    { background: #ef4444; }
    .dot-yellow { background: #f97316; }
    .btn {
      width: 100%;
      padding: 8px;
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #128c7e; }
    .footer {
      padding: 7px 14px;
      background: #0f172a;
      border-top: 1px solid #1e293b;
      text-align: center;
      font-size: 10px;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="icon">💬</span>
    <div>
      <div class="title">Qualibot WA Bridge</div>
      <div class="subtitle">Extensión v2.1.0</div>
    </div>
  </div>

  <div class="body">
    <div class="row">
      <span class="label">Extensión</span>
      <span class="badge badge-green"><span class="dot dot-green"></span>Activa</span>
    </div>
    <div class="row">
      <span class="label">WhatsApp Web</span>
      <span class="badge" id="wa-badge">
        <span class="dot" id="wa-dot"></span>
        <span id="wa-text">Buscando...</span>
      </span>
    </div>
    <div class="row">
      <span class="label">Pestañas WA abiertas</span>
      <span class="label" id="tab-count" style="color:#f8fafc;font-weight:600;">—</span>
    </div>
    <button class="btn" id="btn-open-wa">Abrir WhatsApp Web</button>
  </div>

  <div class="footer">Qualibot CRM &mdash; solo uso interno</div>

  <script src="popup.js"></script>
</body>
</html>
